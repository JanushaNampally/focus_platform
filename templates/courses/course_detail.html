{% extends "base.html" %}

{% block content %}

<h2>{{ course.name }}</h2>

<h3>Subjects</h3>

<ul>
    {% for subject in subjects %}
        <li>
            <a href="{% url 'subject_detail' subject.id %}">
                {{ subject.name }}
            </a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
