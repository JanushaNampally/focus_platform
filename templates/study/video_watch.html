<h2>{{ video.title }}</h2>

<iframe width="800" height="450"
src="https://www.youtube.com/embed/{{ video.youtube_id }}?rel=0&modestbranding=1"
frameborder="0"
allowfullscreen>
</iframe>

<br><br>

<button onclick="endSession()">End Session</button>

<script>
function endSession() {
    fetch("/focus/end_session/{{ session_id }}/")
    .then(response => window.location.href = "/dashboard/");
}
</script>
