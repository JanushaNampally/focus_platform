<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FocusTube</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f6fff8;
        font-family: 'Segoe UI', sans-serif;
        color: #2f3e46;
    }

    .navbar {
        background-color: #6b9080;
    }

    .navbar-brand {
        font-weight: 600;
        color: white !important;
    }

    .card {
        background-color: #eaf4f4;
        border: none;
        border-radius: 18px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        transition: 0.2s ease;
    }

    .card:hover {
        transform: translateY(-4px);
    }

    .btn-primary {
        background-color: #6b9080;
        border: none;
        border-radius: 14px;
        padding: 10px 14px;
    }

    .btn-primary:hover {
        background-color: #5a7a6b;
    }

    .btn-secondary {
        background-color: #a4c3b2;
        border: none;
        border-radius: 14px;
    }

    .btn-secondary:hover {
        background-color: #8fb3a1;
    }

    .muted {
        color: #5f7470;
    }

    h1, h2, h3, h4, h5 {
        font-weight: 600;
    }

    .center-box {
        max-width: 450px;
        margin: auto;
        margin-top: 80px;
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">FocusTube</a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
